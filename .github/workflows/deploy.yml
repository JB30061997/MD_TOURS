name: Deploy MD TOURS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /srv/apps/MD_TOURS/repo

            echo "==== Sync code from GitHub ===="
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            echo "==== Install PHP dependencies ===="
            docker exec md_tours_app composer install --no-dev --optimize-autoloader

            echo "==== Install JS dependencies ===="
            docker exec md_tours_app npm install --legacy-peer-deps

            echo "==== Build Vue/Vite ===="
            docker exec md_tours_app npm run build

            echo "==== Clear Laravel cache ===="
            docker exec md_tours_app php artisan optimize:clear

            echo "==== Run migrations ===="
            docker exec md_tours_app php artisan migrate --force

            echo "==== Optimize Laravel ===="
            docker exec md_tours_app php artisan optimize