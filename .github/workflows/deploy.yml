name: Deploy MD TOURS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /srv/apps/MD_TOURS/repo

            git remote set-url origin git@github.com:JB30061997/MD_TOURS.git
            git reset --hard
            git pull origin main

            docker exec md_tours_app composer install --no-dev --optimize-autoloader

            docker exec md_tours_app php artisan config:clear
            docker exec md_tours_app php artisan cache:clear
            docker exec md_tours_app php artisan route:clear
            docker exec md_tours_app php artisan view:clear
            docker exec md_tours_app php artisan migrate --force
            docker exec md_tours_app php artisan optimize
