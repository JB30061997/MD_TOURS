name: Deploy MD TOURS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /srv/apps/MD_TOURS/repo

            echo "==== Verify and sync code from GitHub safely ===="
            git fetch origin main
            UNRELATED_CHANGES=$(git status --porcelain -- . ':(exclude)package-lock.json')
            if [ -n "$UNRELATED_CHANGES" ]; then
              echo "Deployment stopped: the VPS contains uncommitted application changes."
              echo "$UNRELATED_CHANGES"
              exit 1
            fi
            git merge --ff-only origin/main

            echo "==== Install PHP dependencies ===="
            docker exec md_tours_app composer install --no-dev --optimize-autoloader

            echo "==== Install JS dependencies ===="
            docker exec md_tours_app npm ci --legacy-peer-deps

            echo "==== Build Vue/Vite ===="
            docker exec md_tours_app npm run build

            echo "==== Clear Laravel cache ===="
            docker exec md_tours_app php artisan optimize:clear

            echo "==== Run migrations ===="
            docker exec md_tours_app php artisan migrate --force

            echo "==== One-time verified backup after MD TOURS supplier correction ===="
            BACKUP_DIR=/srv/apps/MD_TOURS/backups
            BACKUP_FILE="$BACKUP_DIR/post-md-tours-supplier-$(date +%Y%m%d-%H%M%S).sql.gz"
            mkdir -p "$BACKUP_DIR"
            docker exec md_tours_mysql sh -c 'mysqldump --no-tablespaces -u"$MYSQL_USER" -p"$MYSQL_PASSWORD" "$MYSQL_DATABASE"' | gzip > "$BACKUP_FILE"
            test -s "$BACKUP_FILE"
            gzip -t "$BACKUP_FILE"
            gunzip -c "$BACKUP_FILE" | tail -n 5 | grep -q "Dump completed"
            echo "Database backup created: $BACKUP_FILE"

            echo "==== Synchronize roles and permissions ===="
            docker exec md_tours_app php artisan db:seed --class=PermissionSeeder --force

            echo "==== Fill missing supplier tariffs from plannings ===="
            docker exec md_tours_app php artisan supplier-vehicule-tarifs:sync-from-plannings --no-overwrite

            echo "==== Optimize Laravel ===="
            docker exec md_tours_app php artisan optimize
